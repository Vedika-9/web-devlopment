<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover 1</title>
<style>
    div{
            background-color: rgb(183, 255, 0);
            height: 150px;
            width: 150px;
            color: rgb(21, 0, 255);
        }

         div:hover{
            background-color: rgb(25, 238, 206);
            color: rgb(113, 24, 14);
            transition: 1s;
        }
</style>
</head>
<body>
   <div>
        <h2>Prem</h2>
        <p>Full Stack Developer</p>
    </div>

    <ul>
        <li>GL</li>
        <li>BL</li>
    </ul>

    <p>Face card</p> 
</body>
<!-- hover means move your mouse and get the change. -->
 <!-- transition is used for controlling time. -->
</html>
