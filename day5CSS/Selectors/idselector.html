<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID selector</title>
    <style>
/* Tag By Id
       #IdName { css properties
       } 
       */

       #web{
        color: blue;
       }

       #vbz{
        color: red;
       }

    </style>
</head>
<body>
    <h1 id="web">Web Development</h1>

    <h1 id="vbz"> App Development</h1>
</body>
<!-- id selector is used for same tagname but we want different styling. -->
<!-- id selector is used for unique value, if the tagname is same. and # is imp. -->
</html>
