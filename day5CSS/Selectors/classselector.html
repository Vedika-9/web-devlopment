<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class selector</title>
<style>
     /* Tag By ClassName
        .ClassName {css properties } */

        .abc{
            color: rgb(116, 145, 22); font-style: inherit;
        }
</style>
</head>
<body>
    <h1 class="abc">Good evening</h1>

    <div class="abc">FootBall</div>

    <p class="abc">Tennis</p>

    <p>Swimming</p>
</body>
<!-- multiple html tags , different html tags 
 and i want to give same styling - for this we use class selector. 
 dot is very imp-->
</html>
