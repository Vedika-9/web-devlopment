<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping selector</title>
    <style>
.xyz , #pqr , p, strong {
    color: darkblue;
    font-style: oblique;
} 
    </style>
</head>
<body>
     <h2 class="xyz">Chocolate</h2>

    <h3 id="pqr">Cake</h3>

    <p>Ice cream</p>
     
    <strong>Pancake</strong>


    <div>
        Basundi
    </div>
<!-- grouping is to group different or same tags together. -->
</body>
</html>
