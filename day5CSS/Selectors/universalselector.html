<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector</title>
<style>
     /* Univesal Selector - * */

         *{
            color: rgb(120, 6, 6);
            background-color: beige;
            text-align: center;
            font-style: initial;
        } 

          /* OR */

        /* body{
             color: blue;
            background-color: beige;
            text-align: center;

        } */
</style>
</head>
<body>
    <h1 id="web">For BL Fans</h1>

    <h1 class="abc">BL Dramas</h1>

    <p class="abc"><Strong>Yaoi</Strong></p>

    <button>Log In</button>
</body>
<!-- universal selector is used for entire web page. -->
 <!-- you can select entire web page through universal and body by writing it in head. -->
</html>
