<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlinecss</title>
</head>
<body>
    <!-- Inline css - in the same Tag using style as attribute -->
<!-- in style attribute , for different properties we need to add semicolon(;) becuz semicolon acts as fullstop. -->
<h1 style=" color: rgb(171, 250, 23); text-align: center; font-family: cursive ;  background-color: rgb(21, 17, 46);">Hello Good Morning</h1>

    <button style="background-color: rgb(91, 23, 23);  color: white; ">Buy Now</button>
<!-- if we use text align in button , it will only align the text inside the button tag and it will not move the button tag -->
    <h1>Web Development</h1>

<!-- to add CSS in html we have 3 types :
 1. Inline - in the same tag using style as attribute.
 <h2 style ="property of css"> = example
 2. Internal - inside HTML File in "head", here we use style as tag.
 3.External- outside the html file , we make css file naming style.css  -->
<!-- inline takes more space horizontally -->
</body>
</html>
