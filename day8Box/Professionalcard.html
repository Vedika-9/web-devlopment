<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
         .card{
            background: rgb(79, 209, 245);
            width: 320px;
            padding: 20px ;
            margin: 30px auto;

            border: 1px solid rgb(14, 14, 5);
            border-radius: 10px;
        }
        button {
            background: rgb(235, 255, 11);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Web Development</h2>
        <p>Learn HTML CSS Javascript</p>
        <button >
            Enroll
        </button>
    </div>
</body>
<!-- for margin 30px is done for top and bottom , and auto is done for left and right of page. -->
</html>
