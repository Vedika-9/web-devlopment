<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Tag</title>
</head>
<body>
   <select name="Countries">
    <option disabled>  India </option>
     <option> Thailand </option>
      <option> South Korea </option>
       <option> Taiwan </option>
        <option> Germany </option>
         <option selected disabled> Countries </option>
          <option label="USA">United Sates of America</option>
   </select>

   <!-- select tag is a drop down box -->
<!-- selected = it means it will be always on the top  -->
 <!-- disabled will disable the option -->
  <!-- label is used for shortform -->

   <select required >
     <option>Delhi</option>
        <option>Mumbai</option>
        <option>Shimla</option>
   </select>
   <!-- required attribute means mandatory -->

   <select disabled>
     <option>Chang Mai</option>
        <option>Mumbai</option>
        <option>Pune</option>
   </select>

   <select multiple >
     <option> Jaipur </option>
        <option>Mumbai</option>
        <option>Ratnagiri</option>
        <option>Nashik</option>
   </select>

    <select size="4">
        <option>Kerala</option>
        <option>Mumbai</option>
        <option>Mysore</option>
        <option>Bangalore</option>
        <option>Chennai</option>
        <option>Ratnagiri</option>
    </select>

</body>
</html>
