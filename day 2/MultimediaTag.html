<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <!-- video - mp4 -->

    <video  autoplay  loop height="300" muted  width="400">
        <source src="https://www.pexels.com/download/video/30505187/" type="video/mp4">
    </video>

<video  controls autoplay loop muted width="580" height="300">
    <source src="https://www.pexels.com/download/video/10503712/">
</video>

<!-- Audio - mp3 -->

<audio controls>
    <source src="./crab_audio-a-real-groove-322193.mp3">
</audio>

<!-- controls : is used for giving play button control to user. -->
<!-- autoplay: used to play video directly -->
 <!-- loop: runs forever -->
  <!-- muted: if you don't want video's audio play then mute it. -->
   <!-- In audio tag you always write controls. -->
</body>
</html>
