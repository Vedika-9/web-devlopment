<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interesting Tag</title>
</head>
<body>
     <details>
    <summary>What is Netflix</summary>
    <p>Netflix is an OTT Platform</p>
  </details>  

 <progress value="75" max="100"></progress>

 <meter value="40"  min="0" max="100"></meter>

 <p>What is 
    <abbr title="HyperText Markup Language">HTML</abbr>
 </p>

 <p>
    Use <code>console.log()</code> To print output.
 </p>

 <p>
    Press <kbd>Ctrl</kbd> + <kbd>C</kbd>
 </p>

 <marquee>
    Welcome To Delusional World.
 </marquee>

 <p>
    Event Date
    <time datetime="2026-09-27">
        September 27,2026
    </time>
 </p>

 <dialog open>
    Hello I am PopUP
 </dialog>

 <!-- details tag:  for Q&A and in details tag we need to provide summary ie.Question and in para. tag we need to write answer. -->
<!-- progress: creates loading bar and value,maximum can be put in it. -->
<!-- meter : shows measurement like battery level, storage usage, it also contain value, min, max. -->
<!-- abbrevation tag : to show shortform and also when we click on it , it will show full form. -->
 <!-- code is used for coding words/ coding statement. -->
  <!-- kbd stands for representation of keyboard keys. -->
   <!-- marquee tag makes your text move from right to left-->
    <!-- time tag is used for search engine optimization. -->
     <!-- dialog is used for popup message. -->
</body>
</html>
