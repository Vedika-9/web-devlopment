<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>
<body>

 <table border="1" cellspacing="10" cellpadding="10"  bgcolor="red" align="center">

<thead bgcolor="yellow" align="center">
<tr>
<th>EmpID</th>
<th>Name</th>
<th>Dept</th>
</tr>
</thead>

<tbody bgcolor="blue" align="center">
<tr>
<td>001</td>
<td>Vedika</td>
<td>Finance</td>
</tr>

<tr>
<td>002</td>
<td>Lavish</td>
<td>Sales</td>
</tr>

<tr>
<td>003</td>
<td>Varnit</td>
<td>Marketing</td>
</tr>
</tbody>

</table>
<!-- tr is table row  -->
<!-- th is table heading(colunm)  -->
<!-- td is table data -->
 <!-- cellspacing : it will add space between the box -->
  <!-- cellpadding : Add the space inside the box from all 4 direction -->
</body>
</html>
