<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
</head>
<body>
     <strong>Feedback</strong>
    <form> 
<label>Name</label><sup>*</sup>
<input type="text" required>  <br><br>

<label>Email</label><sup>*</sup>
<input type="email" placeholder="Enter your email" required> <br><br>

<label>How was cake?</label>
 <input type="text" placeholder="Please provide your valuable feedback."> <br> <br>

 <label> Rate</label>
 <input type="number" placeholder="Please rate us."> <br> <br>

<label>Improvements, if needed</label>
<input type="text" placeholder="Yes or No"> <br><br>

<button type="submit">Submit</button>

    </form>
</body>
</html>
